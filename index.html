<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Calculator </title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <button id="theme-toggle" class="theme-toggle" aria-label="Toggle Theme">
        <svg id="sun-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display: none;">
            <circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/>
        </svg>
        <svg id="moon-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/>
        </svg>
    </button>

    <div class="calculator app-container">
        <div class="calculator-screen" id="display">0</div>

        <div class="top-nav">
            <button id="nav-history">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-history-icon lucide-history">
                    <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
                    <path d="M3 3v5h5"/><path d="M12 7v5l4 2"/>
                </svg>
            </button>
            <button id="nav-convertor">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-ruler-dimension-line-icon lucide-ruler-dimension-line"><path d="M10 15v-3"/><path d="M14 15v-3"/><path d="M18 15v-3"/><path d="M2 8V4"/>
                    <path d="M22 6H2"/><path d="M22 8V4"/>
                    <path d="M6 15v-3"/><rect x="2" y="12" width="20" height="8" rx="2"/>
                </svg>
            </button>
            <button id="nav-calc">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-calculator-icon lucide-calculator"><rect width="16" height="20" x="4" y="2" rx="2"/><line x1="8" x2="16" y1="6" y2="6"/><line x1="16" x2="16" y1="14" y2="18"/><path d="M16 10h.01"/><path d="M12 10h.01"/>
                    <path d="M8 10h.01"/><path d="M12 14h.01"/>
                    <path d="M8 14h.01"/><path d="M12 18h.01"/>
                    <path d="M8 18h.01"/>
                </svg>
            </button>
            <button id="nav-tip">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-circle-dollar-sign">
                    <circle cx="12" cy="12" r="10"/><path d="M16 8h-6a2 2 0 1 0 0 4h4a2 2 0 1 1 0 4H8"/><path d="M12 18V6"/>
                </svg>
            </button>

            <button id="nav-sci-toggle">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-flask-conical"><path d="M10 2v7.31"/><path d="M14 9.3V1.99"/><path d="M8.5 2h7"/><path d="M14 9.3a6.5 6.5 0 1 1-4 0z"/><path d="M5.52 16h10.96"/></svg>
            </button>
            <div class="spacer"></div>
            <button id="button-backspace" class="backspace-button">⌫</button>
        </div>

        <div id="view-calc" class="view active">
            
            <div class="calculator-keys">
                <button class="all-clear" value="all-clear">AC</button>
                <button class="brackets" value="()">()</button>
                <button class="percentage" value="%">%</button>
                <button class="operator" value="/">&divide;</button>

                <button value="7">7</button>
                <button value="8">8</button>
                <button value="9">9</button>
                <button class="operator" value="*">&times;</button>
                
                <button value="4">4</button>
                <button value="5">5</button>
                <button value="6">6</button>
                <button class="operator" value="-">-</button>

                <button value="1">1</button>
                <button value="2">2</button>
                <button value="3">3</button>
                <button class="operator" value="+">+</button>

                <button class="sign-change" value="-">+/-</button>
                <button value="0">0</button>
                <button class="decimal" value=".">.</button>
                <button class="equal-sign" value="=">=</button>
            </div>
        </div>

        <div id="view-history" class="view hidden">
            <div class="view-header">History</div>
            <ul id="history-list"></ul>
            <button id="clear-history">Clear History</button>
        </div>

        <div id="view-convertor" class="view hidden">
            <div class="view-header">Convertor</div>
            
            <div class="category-slider" id="category-slider">
                <button class="category-btn active" data-category="length">Length</button>
                <button class="category-btn" data-category="temperature">Temperature</button>
                <button class="category-btn" data-category="area">Area</button>
                <button class="category-btn" data-category="volume">Volume</button>
                <button class="category-btn" data-category="mass">Mass</button>
                <button class="category-btn" data-category="data">Data</button>
                <button class="category-btn" data-category="speed">Speed</button>
                <button class="category-btn" data-category="time">Time</button>
            </div>

            <div class="convertor-inputs">
                <input type="number" id="convertor-input" value="1">
                <select id="convertor-from"></select>
                <div class="equals-text">=</div>
                <input type="number" id="convertor-output" readonly>
                <select id="convertor-to"></select>
            </div>
        </div>

        <div id="view-tip" class="view hidden">
            <div class="view-header">Tip Calculator</div>

            <div class="tip-container">
                <div class="tip-input-group">
                    <label>Bill Amount</label>
                    <input type="number" id="bill-input" placeholder="0.00">
                </div>

                <div class="tip-input-group">
                    <label>Tip % (<span id="tip-percent-display">15</span>%)</label>
                    <input type="range" id="tip-slider" min="0" max="100" value="15" step="1">
                </div>

                <div class="tip-input-group split-group">
                    <label>Split</label>
                    <div class="split-controls">
                        <button id="split-minus" class="split-btn">-</button>
                        <span id="split-count">1</span>
                        <button id="split-plus" class="split-btn">+</button>
                    </div>
                </div>

                <div class="tip-results">
                    <div class="result-row">
                        <span>Tip Amount</span>
                        <span id="tip-amount" class="result-value">$0.00</span>
                    </div>
                    <div class="result-row total">
                        <span>Total (Per Person)</span>
                        <span id="total-per-person" class="result-value">$0.00</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
